name: Sync from Gitee to GitHub

on:
  # 定时任务：每天 UTC 时间 18 点（对应北京时间凌晨 2 点）自动去 Gitee 抓取一次
  schedule:
    - cron: '0 18 * * *'
  # 允许在 GitHub Actions 页面手动点击 "Run workflow" 触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror from Gitee to GitHub
        uses: Yikun/hub-mirror-action@master
        with:
          src: gitee/${{ secrets.GITEE_USER }}          # 源端：你的 Gitee 账号
          src_key: ${{ secrets.GITEE_PRIVATE_KEY }}     # Gitee SSH 私钥（用于从 Gitee 拉取）
          src_token: ${{ secrets.GITEE_TOKEN }}         # Gitee Token（用于 API 认证）
          dst: github/${{ github.repository_owner }}    # 目的端：你的 GitHub 账号
          dst_key: ${{ secrets.GITHUB_PRIVATE_KEY }}    # 往 GitHub 推送代码的私钥
          dst_token: ${{ secrets.GITHUB_TOKEN_PAT }}    # GitHub 的 API Token
          account_type: user
          static_list: "android-log-analyzer"           # 你要抓取的仓库名
          force_update: true                            # 强制覆盖更新
